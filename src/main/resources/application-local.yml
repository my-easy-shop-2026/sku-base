server:
  port: 8088

sql:
  limit-size: 3000

spring:
  application:
    name: sku-base

  datasource:
    dynamic:
      enabled: true #启用动态数据源，默认true
      primary: master #设置默认的数据源或者数据源组,默认值即为master
      strict: false #严格匹配数据源,默认false. true未匹配到指定数据源时抛异常,false使用默认数据源
      grace-destroy: false #是否优雅关闭数据源，默认为false，设置为true时，关闭数据源时如果数据源中还存在活跃连接，至多等待10s后强制关闭
      datasource:
        master:
          url: jdbc:mysql://127.0.0.1:3311/easyshop_sku
          username: root
          password: 123456
          driver-class-name: com.mysql.jdbc.Driver # 3.2.0开始支持SPI可省略此配置
        slave_1:
          url: jdbc:mysql://127.0.0.1:3311/easyshop_sku
          username: root
          password: 123456
          driver-class-name: com.mysql.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
#      host: 54.254.60.123
#      port: 6379
#      username: lpadmin
#      password: VWT*dej3vwg.uma4naz
#      database: 0
#      ssl:
#        enabled: true

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        group: "SERVICE_GROUP"
    alibaba:
      seata:
        tx-service-group: my_test_tx_group

# custom setting
  auth:
    accessTokenDuration: 600 #秒
    refreshTokenDuration: 2592000 #秒

logging:
  level:
    org:
      springframework: DEBUG
    com:
      linkpay:
        cardBase:
          mapper: DEBUG
    io:
      seata: DEBUG

